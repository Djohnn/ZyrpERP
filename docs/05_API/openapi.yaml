openapi: 3.1.0
info:
  title: Zyrp API
  version: 0.1.0
  description: Initial contract skeleton. Domain operations require capability PRDs.
servers:
  - url: http://localhost:8000/api/v1
    description: Local
  - url: https://staging.example.invalid/api/v1
    description: Reserved non-resolving example for the future staging environment
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return service health
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, const: ok }
  /auth/register/:
    post:
      operationId: registerOrganization
      summary: Register the first administrator and organization
      security: []
      responses:
        "202": { description: Request accepted without account enumeration }
        "400": { $ref: "#/components/responses/Problem" }
        "429": { $ref: "#/components/responses/Problem" }
  /auth/email/confirm/:
    post:
      operationId: confirmEmail
      summary: Consume a single-use email confirmation token
      security: []
      responses:
        "204": { description: Email confirmed }
        "400": { $ref: "#/components/responses/Problem" }
  /auth/login/:
    post:
      operationId: login
      summary: Validate credentials and start a pre-MFA session
      security: []
      responses:
        "202": { description: MFA challenge required }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "429": { $ref: "#/components/responses/Problem" }
  /auth/mfa/totp/enroll/:
    post:
      operationId: enrollTotp
      summary: Start TOTP enrollment for an active membership
      security: []
      responses:
        "201": { description: Enrollment URI returned once }
        "404": { $ref: "#/components/responses/Problem" }
  /auth/mfa/totp/confirm/:
    post:
      operationId: confirmTotp
      summary: Confirm TOTP and complete session authentication
      security: []
      responses:
        "204": { description: Authentication completed }
        "400": { $ref: "#/components/responses/Problem" }
  /auth/mfa/email/send/:
    post:
      operationId: sendEmailMfa
      summary: Send a short-lived email MFA challenge
      security: []
      responses:
        "202": { description: Challenge sent }
        "429": { $ref: "#/components/responses/Problem" }
  /auth/mfa/challenge/:
    post:
      operationId: confirmEmailMfa
      summary: Consume an email MFA challenge
      security: []
      responses:
        "204": { description: Authentication completed }
        "400": { $ref: "#/components/responses/Problem" }
  /auth/password/forgot/:
    post:
      operationId: forgotPassword
      summary: Request password recovery without account enumeration
      security: []
      responses:
        "202": { description: Generic accepted response }
  /auth/password/reset/:
    post:
      operationId: resetPassword
      summary: Consume recovery token and revoke prior sessions
      security: []
      responses:
        "204": { description: Password changed }
        "400": { $ref: "#/components/responses/Problem" }
  /invitations/:
    get:
      operationId: listInvitations
      summary: List invitations in the active tenant
      responses:
        "200": { description: Invitation list }
    post:
      operationId: createInvitation
      summary: Invite a user with role and branch scope
      responses:
        "201": { description: Invitation created }
        "403": { $ref: "#/components/responses/Problem" }
  /memberships/{id}/:
    patch:
      operationId: updateMembership
      summary: Update role, status and branch scope
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Membership updated }
        "404": { $ref: "#/components/responses/Problem" }
  /security/mfa-policy/:
    patch:
      operationId: updateMfaPolicy
      summary: Configure MFA methods allowed by the active tenant
      responses:
        "200": { description: Policy updated }
        "403": { $ref: "#/components/responses/Problem" }
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sessionid
  responses:
    Problem:
      description: RFC 9457 compatible problem response
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: string, pattern: "^-?[0-9]+(\\.[0-9]{1,4})?$" }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
    TenantContext:
      type: object
      required: [tenant_id]
      properties:
        tenant_id: { type: string, format: uuid }
        company_id: { type: [string, "null"], format: uuid }
        branch_id: { type: [string, "null"], format: uuid }
    Problem:
      type: object
      required: [type, title, status, code, correlation_id]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
        code: { type: string }
        correlation_id: { type: string }
security:
  - sessionAuth: []
