openapi: 3.1.0
info:
  title: Zyrp API
  version: 0.1.0
  description: Initial contract skeleton. Domain operations require capability PRDs.
servers:
  - url: http://localhost:8000/api/v1
    description: Local
  - url: https://staging.example.invalid/api/v1
    description: Reserved non-resolving example for the future staging environment
paths:
  /health:
    get:
      operationId: getHealth
      summary: Return service health
      security: []
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, const: ok }
  /auth/register/:
    post:
      operationId: registerOrganization
      summary: Register the first administrator and organization
      security: []
      responses:
        "202": { description: Request accepted without account enumeration }
        "400": { $ref: "#/components/responses/Problem" }
        "429": { $ref: "#/components/responses/Problem" }
  /auth/email/confirm/:
    post:
      operationId: confirmEmail
      summary: Consume a single-use email confirmation token
      security: []
      responses:
        "204": { description: Email confirmed }
        "400": { $ref: "#/components/responses/Problem" }
  /auth/login/:
    post:
      operationId: login
      summary: Validate credentials and start a pre-MFA session
      security: []
      responses:
        "202": { description: MFA challenge required }
        "401": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
        "429": { $ref: "#/components/responses/Problem" }
  /auth/mfa/totp/enroll/:
    post:
      operationId: enrollTotp
      summary: Start TOTP enrollment for an active membership
      security: []
      responses:
        "201": { description: Enrollment URI returned once }
        "404": { $ref: "#/components/responses/Problem" }
  /auth/mfa/totp/confirm/:
    post:
      operationId: confirmTotp
      summary: Confirm TOTP and complete session authentication
      security: []
      responses:
        "204": { description: Authentication completed }
        "400": { $ref: "#/components/responses/Problem" }
  /auth/mfa/email/send/:
    post:
      operationId: sendEmailMfa
      summary: Send a short-lived email MFA challenge
      security: []
      responses:
        "202": { description: Challenge sent }
        "429": { $ref: "#/components/responses/Problem" }
  /auth/mfa/challenge/:
    post:
      operationId: confirmEmailMfa
      summary: Consume an email MFA challenge
      security: []
      responses:
        "204": { description: Authentication completed }
        "400": { $ref: "#/components/responses/Problem" }
  /auth/password/forgot/:
    post:
      operationId: forgotPassword
      summary: Request password recovery without account enumeration
      security: []
      responses:
        "202": { description: Generic accepted response }
  /auth/password/reset/:
    post:
      operationId: resetPassword
      summary: Consume recovery token and revoke prior sessions
      security: []
      responses:
        "204": { description: Password changed }
        "400": { $ref: "#/components/responses/Problem" }
  /invitations/:
    get:
      operationId: listInvitations
      summary: List invitations in the active tenant
      responses:
        "200": { description: Invitation list }
    post:
      operationId: createInvitation
      summary: Invite a user with role and branch scope
      responses:
        "201": { description: Invitation created }
        "403": { $ref: "#/components/responses/Problem" }
  /memberships/{id}/:
    patch:
      operationId: updateMembership
      summary: Update role, status and branch scope
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Membership updated }
        "404": { $ref: "#/components/responses/Problem" }
  /security/mfa-policy/:
    patch:
      operationId: updateMfaPolicy
      summary: Configure MFA methods allowed by the active tenant
      responses:
        "200": { description: Policy updated }
        "403": { $ref: "#/components/responses/Problem" }
  /categories/:
    get:
      operationId: listCategories
      summary: List catalog categories for the active tenant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/IsActive"
      responses:
        "200": { description: Category list }
        "403": { $ref: "#/components/responses/Problem" }
    post:
      operationId: createCategory
      summary: Create a catalog category
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Category" }
      responses:
        "201": { description: Category created }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
  /units/:
    get:
      operationId: listUnits
      summary: List catalog units for the active tenant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/IsActive"
      responses:
        "200": { description: Unit list }
        "403": { $ref: "#/components/responses/Problem" }
    post:
      operationId: createUnit
      summary: Create a catalog unit
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Unit" }
      responses:
        "201": { description: Unit created }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
  /products/:
    get:
      operationId: listProducts
      summary: List products for the active tenant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/Search"
        - $ref: "#/components/parameters/IsActive"
        - in: query
          name: category
          schema: { type: string, format: uuid }
      responses:
        "200": { description: Product list }
        "403": { $ref: "#/components/responses/Problem" }
    post:
      operationId: createProduct
      summary: Create a product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Product" }
      responses:
        "201": { description: Product created }
        "400": { $ref: "#/components/responses/Problem" }
        "403": { $ref: "#/components/responses/Problem" }
  /products/{product_id}/effective-price/:
    get:
      operationId: getProductEffectivePrice
      summary: Resolve the effective product price for a branch and instant
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductId"
        - in: query
          name: branch_id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: at
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: Effective price
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EffectivePrice" }
        "400": { $ref: "#/components/responses/Problem" }
        "404": { $ref: "#/components/responses/Problem" }
  /products/{product_pk}/codes/:
    get:
      operationId: listProductCodes
      summary: List product codes
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      responses:
        "200": { description: Product code list }
    post:
      operationId: createProductCode
      summary: Create a code for the URL product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductCode" }
      responses:
        "201": { description: Product code created }
        "400": { $ref: "#/components/responses/Problem" }
  /products/{product_pk}/units/:
    get:
      operationId: listProductUnits
      summary: List commercial units for a product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      responses:
        "200": { description: Product unit list }
    post:
      operationId: createProductUnit
      summary: Create a commercial unit for the URL product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductUnit" }
      responses:
        "201": { description: Product unit created }
        "400": { $ref: "#/components/responses/Problem" }
  /products/{product_pk}/prices/:
    get:
      operationId: listProductPrices
      summary: List tenant-level prices for a product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      responses:
        "200": { description: Product price list }
    post:
      operationId: createProductPrice
      summary: Create a tenant-level price for the URL product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProductPrice" }
      responses:
        "201": { description: Product price created }
        "400": { $ref: "#/components/responses/Problem" }
  /products/{product_pk}/branch-prices/:
    get:
      operationId: listBranchPrices
      summary: List branch price overrides for a product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      responses:
        "200": { description: Branch price list }
    post:
      operationId: createBranchPrice
      summary: Create a branch price override for the URL product
      parameters:
        - $ref: "#/components/parameters/TenantHeader"
        - $ref: "#/components/parameters/ProductPk"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BranchPrice" }
      responses:
        "201": { description: Branch price created }
        "400": { $ref: "#/components/responses/Problem" }
components:
  parameters:
    TenantHeader:
      in: header
      name: X-Tenant-ID
      required: true
      schema: { type: string, format: uuid }
    Search:
      in: query
      name: search
      schema: { type: string, maxLength: 120 }
    IsActive:
      in: query
      name: is_active
      schema: { type: boolean }
    ProductId:
      in: path
      name: product_id
      required: true
      schema: { type: string, format: uuid }
    ProductPk:
      in: path
      name: product_pk
      required: true
      schema: { type: string, format: uuid }
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sessionid
  responses:
    Problem:
      description: RFC 9457 compatible problem response
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
  schemas:
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount: { type: string, pattern: "^-?[0-9]+(\\.[0-9]{1,4})?$" }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
    TenantContext:
      type: object
      required: [tenant_id]
      properties:
        tenant_id: { type: string, format: uuid }
        company_id: { type: [string, "null"], format: uuid }
        branch_id: { type: [string, "null"], format: uuid }
    Category:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        name: { type: string, maxLength: 120 }
        code: { type: string, maxLength: 40 }
        parent: { type: [string, "null"], format: uuid }
        is_active: { type: boolean }
        version: { type: integer, readOnly: true }
    Unit:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        symbol: { type: string, maxLength: 12 }
        name: { type: string, maxLength: 80 }
        precision: { type: integer, minimum: 0, maximum: 6 }
        is_active: { type: boolean }
        version: { type: integer, readOnly: true }
    Product:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        sku: { type: string, maxLength: 64 }
        name: { type: string, maxLength: 200 }
        description: { type: string }
        category: { type: [string, "null"], format: uuid }
        base_unit: { type: string, format: uuid }
        requires_lot: { type: boolean }
        requires_expiry: { type: boolean }
        is_active: { type: boolean }
        version: { type: integer, readOnly: true }
    ProductCode:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        product: { type: string, format: uuid, readOnly: true }
        code_type: { type: string, enum: [internal, ean, gtin, supplier] }
        value: { type: string, maxLength: 64 }
        is_principal: { type: boolean }
        is_active: { type: boolean }
        version: { type: integer, readOnly: true }
    ProductUnit:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        product: { type: string, format: uuid, readOnly: true }
        unit: { type: string, format: uuid }
        factor: { type: string, pattern: "^[0-9]+(\\.[0-9]{1,6})?$" }
        is_active: { type: boolean }
        version: { type: integer, readOnly: true }
    ProductPrice:
      type: object
      properties:
        id: { type: string, format: uuid, readOnly: true }
        product: { type: string, format: uuid, readOnly: true }
        amount: { type: string, pattern: "^[0-9]+(\\.[0-9]{1,4})?$" }
        valid_from: { type: string, format: date-time }
        valid_to: { type: [string, "null"], format: date-time }
        is_active: { type: boolean }
        version: { type: integer, readOnly: true }
    BranchPrice:
      allOf:
        - $ref: "#/components/schemas/ProductPrice"
        - type: object
          properties:
            branch: { type: string, format: uuid }
    EffectivePrice:
      type: object
      required: [id, amount, currency, source]
      properties:
        id: { type: string, format: uuid }
        amount: { type: string, pattern: "^[0-9]+(\\.[0-9]{1,4})?$" }
        currency: { type: string, const: BRL }
        source: { type: string, enum: [tenant, branch] }
        valid_from: { type: [string, "null"], format: date-time }
        valid_to: { type: [string, "null"], format: date-time }
    Problem:
      type: object
      required: [type, title, status, code, correlation_id]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
        code: { type: string }
        correlation_id: { type: string }
security:
  - sessionAuth: []
