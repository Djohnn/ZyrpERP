services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zyrp}
      POSTGRES_USER: ${POSTGRES_USER:-zyrp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zyrp}
    ports:
      - '127.0.0.1:${POSTGRES_EXTERNAL_PORT:-5433}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zyrp} -d ${POSTGRES_DB:-zyrp}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - zyrp-local

  redis:
    image: redis:7-alpine
    ports:
      - '127.0.0.1:${REDIS_EXTERNAL_PORT:-6380}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - zyrp-local

volumes:
  postgres-data:
  redis-data:

networks:
  zyrp-local:
    driver: bridge
