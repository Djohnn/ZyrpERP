services:
  pdv-e2e:
    build:
      context: .
      dockerfile: Dockerfile.e2e
    ports:
      - "5173:5173"
    healthcheck:
      test: wget -qO- http://localhost:5173 || exit 1
      interval: 5s
      timeout: 5s
      retries: 12
    command: >
      sh -c "./node_modules/.bin/vite --host 0.0.0.0 --port 5173 & sleep 3 && ./node_modules/.bin/playwright test --reporter=list"
